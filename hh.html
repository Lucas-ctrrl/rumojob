<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Interesses de Trabalho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-background">
        <div class="form-container">
            <h1>Interesses de Trabalho</h1>
            <form id="interestsForm">
                <!-- Pergunta 1 -->
                <div class="form-group">
                    <label>1. Quais são as ideias/atividades que te interessam?</label><br>
                    <input type="checkbox" id="formato1" name="formato" value="Criativo">
                    <label for="formato1">Ser Criativo</label><br>
                    <input type="checkbox" id="formato2" name="formato" value="Lideranca">
                    <label for="formato2">Liderança e Orientação</label><br>
                    <input type="checkbox" id="formato3" name="formato" value="Problema">
                    <label for="formato3">Solucionar Problemas</label><br>
                    <input type="checkbox" id="formato3" name="formato" value="Fora">
                    <label for="formato3">Trabalhar Fora de Casa</label><br>
                    <input type="checkbox" id="formato3" name="formato" value="Dados">
                    <label for="formato3">Trabalhar com Dados</label><br>
                    <input type="checkbox" id="formato3" name="formato" value="Mãos">
                    <label for="formato3">Trabalhar com minhas mãos</label><br>
                    <input type="checkbox" id="formato3" name="formato" value="Pessoas">
                    <label for="formato3">Trabalhar com Pessoas</label><br>
                </div>

                <div class="form-group">
                    <label>2. Quais áreas de trabalho mais te interessam?</label><br>
                    <input type="checkbox" id="area1" name="area" value="Tecnologia">
                    <label for="area1">Tecnologia</label><br>
                    <input type="checkbox" id="area3" name="area" value="Educação">
                    <label for="area3">Educação</label><br>
                    <input type="checkbox" id="area4" name="area" value="Engenharia">
                    <label for="area4">Engenharia</label><br>
                </div>

            <!-- Div para exibir a resposta -->
            <div id="result" class="result"></div>
        </div>
    </div>

</body>
</html
